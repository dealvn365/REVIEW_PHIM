<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xem phim full</title>

<!-- ✅ Facebook thumbnail -->
<meta property="og:title" content="🎬 Xem phim full miễn phí">
<meta property="og:description" content="Click để xem phim cực hay 🔥">
<meta property="og:image" content="https://img.youtube.com/vi/g9cQTE4t5cI/maxresdefault.jpg">
<meta property="og:url" content="https://dealvn365.github.io/muasam/">
<meta property="og:type" content="website">

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
}

/* CARD FULL MÀN */
.card{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* VIDEO */
.video-wrap{
  position:relative;
  width:100%;
  height:100%;
}

.video-wrap iframe{
  width:100%;
  height:100%;
  border:0;
}

/* NÚT PLAY */
.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:24px;
  padding:15px 30px;
  background:red;
  border:none;
  border-radius:30px;
  color:white;
  cursor:pointer;
  z-index:5;
}
</style>

</head>

<body>

<!-- 🎬 VIDEO FULL -->
<div class="card">
  <div class="video-wrap">

    <!-- nút play để có tiếng -->
    <button class="play-btn" onclick="playVideo()">▶ Xem phim</button>

    <iframe id="videoFrame" allow="autoplay"></iframe>

  </div>
</div>

<script>

// ▶ play video (có tiếng)
function playVideo(){
  document.getElementById("videoFrame").src =
  "https://www.youtube.com/embed/g9cQTE4t5cI?autoplay=1";

  document.querySelector(".play-btn").style.display="none";
}

// 🎯 random 30–120s chuyển Shopee
let delay = Math.floor(Math.random() * (120 - 30 + 1) + 30) * 1000;

setTimeout(() => {
  window.location.href = "https://shopee.vn";
}, delay);

</script>

</body>
</html>
